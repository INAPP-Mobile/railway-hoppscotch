<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ab795"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="200" fill="#3ab795" opacity="0.07"/>
  <circle cx="150" cy="500" r="150" fill="#2dd4bf" opacity="0.05"/>
  <!-- Bolt icon -->
  <g transform="translate(160,200)">
    <path d="M-30 70 L-80 30 L-120 10 L0 -120 L120 10 L80 30 L30 70 Z" fill="url(#accent)" stroke="#2dd4bf" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="0" cy="5" r="24" fill="#0f172a"/>
  </g>
  <text x="340" y="240" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="64" font-weight="700">Hoppscotch</text>
  <text x="340" y="310" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="32" font-weight="400">Deploy on Railway</text>
  <text x="340" y="360" fill="#64748b" font-family="system-ui, sans-serif" font-size="22">Self-hosted Postman alternative</text>
  <!-- Feature pills -->
  <rect x="100" y="420" rx="20" width="220" height="44" fill="#1e293b" stroke="#3ab795" stroke-width="1.5"/>
  <text x="210" y="448" text-anchor="middle" fill="#3ab795" font-family="system-ui, sans-serif" font-size="16" font-weight="600">79.7K ★ GitHub</text>
  <rect x="340" y="420" rx="20" width="220" height="44" fill="#1e293b" stroke="#3ab795" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" fill="#3ab795" font-family="system-ui, sans-serif" font-size="16" font-weight="600">MIT License</text>
  <rect x="580" y="420" rx="20" width="220" height="44" fill="#1e293b" stroke="#3ab795" stroke-width="1.5"/>
  <text x="690" y="448" text-anchor="middle" fill="#3ab795" font-family="system-ui, sans-serif" font-size="16" font-weight="600">API Dev Tools</text>
</svg>
